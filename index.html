		<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
		<style>
			:root {
				--ink: #e6ede9;
				--muted: #86a298;
				--dim: #6f8a80;
				--teal: #56c9a6;
				--green: #5fcf9e;
				--coral: #e0928b;
				--gold: #e0a96d;
				--surface: rgba(255, 255, 255, 0.025);
				--border: rgba(255, 255, 255, 0.08);
				--border2: rgba(255, 255, 255, 0.13);
				--sans: 'Hanken Grotesk', system-ui, -apple-system, sans-serif;
				--mono: 'JetBrains Mono', ui-monospace, monospace;
			}
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			body {
				font-family: var(--sans);
				color: var(--ink);
				background: linear-gradient(
					180deg,
					#0d3a2e 0%,
					#0a3027 30%,
					#082822 100%
				);
				background-attachment: fixed;
				min-height: 100vh;
				overflow-x: hidden;
				-webkit-text-size-adjust: 100%;
				-webkit-font-smoothing: antialiased;
			}
			.wrap {
				max-width: 1080px;
				margin: 0 auto;
				padding: 30px 20px 64px;
			}
			.ic {
				width: 16px;
				height: 16px;
				display: inline-block;
				vertical-align: -0.18em;
				flex: none;
			}

			/* header */
			.brand {
				display: flex;
				align-items: center;
				gap: 16px;
				margin: 0 0 26px;
				flex-wrap: wrap;
			}
			.brand-text {
				flex: 1 1 0;
				min-width: 0;
			}
			.brand .logo {
				width: 52px;
				height: 52px;
				flex: 0 0 auto;
				object-fit: contain;
				border-radius: 12px;
			}
			.brand .logo.emoji .ic {
				width: 42px;
				height: 42px;
				color: var(--teal);
			}
			h1 {
				font-size: 30px;
				font-weight: 800;
				letter-spacing: -0.01em;
				line-height: 1.1;
			}
			h1 .chip {
				color: var(--teal);
			}
			.sub {
				font-family: var(--mono);
				color: var(--muted);
				font-size: 12.5px;
				margin-top: 6px;
				letter-spacing: 0.01em;
			}
			.langseg {
				margin-left: auto;
			}

			/* segmented controls */
			.seg {
				display: inline-flex;
				background: rgba(0, 0, 0, 0.25);
				border: 1px solid var(--border);
				border-radius: 11px;
				padding: 3px;
				gap: 2px;
			}
			.seg button {
				appearance: none;
				border: 0;
				background: transparent;
				color: var(--muted);
				font-family: var(--mono);
				font-size: 12px;
				font-weight: 500;
				letter-spacing: 0.03em;
				padding: 7px 14px;
				border-radius: 8px;
				cursor: pointer;
				transition: background 0.15s, color 0.15s;
			}
			.seg button:hover {
				color: var(--ink);
			}
			.seg button.active {
				background: var(--teal);
				color: #06231b;
				font-weight: 600;
			}
			.langseg button {
				padding: 6px 12px;
			}

			/* filter bar */
			.filterbar {
				display: flex;
				align-items: center;
				gap: 12px;
				margin: 0 0 20px;
				flex-wrap: wrap;
			}
			.filterbar .lbl {
				display: inline-flex;
				align-items: center;
				gap: 7px;
				color: var(--muted);
				font-family: var(--mono);
				font-size: 11px;
				text-transform: uppercase;
				letter-spacing: 0.12em;
			}

			/* recap banner */
			#recap:empty {
				display: none;
			}
			.recap-inner {
				display: flex;
				flex-wrap: wrap;
				align-items: center;
				gap: 8px 18px;
				background: var(--surface);
				border: 1px solid rgba(86, 201, 166, 0.2);
				border-radius: 12px;
				padding: 13px 18px;
				margin: 0 0 22px;
				font-size: 14px;
			}
			.recap-results {
				margin-left: auto;
				display: inline-flex;
				gap: 18px;
				flex-wrap: wrap;
				font-size: 13px;
			}
			.recap-res .rw {
				color: var(--dim);
			}
			.recap-res b {
				font-weight: 600;
				color: var(--ink);
			}
			.recap-label {
				display: inline-flex;
				align-items: center;
				gap: 7px;
				color: var(--teal);
				font-family: var(--mono);
				font-weight: 600;
				text-transform: uppercase;
				font-size: 11px;
				letter-spacing: 0.12em;
			}
			.recap-meta {
				color: var(--muted);
				font-family: var(--mono);
				font-size: 12.5px;
			}
			.recap-win {
				color: var(--green);
				font-weight: 600;
				font-family: var(--mono);
			}
			.recap-loss {
				color: var(--coral);
				font-weight: 600;
				font-family: var(--mono);
			}

			/* award cards */
			.cards {
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
				gap: 14px;
				margin-bottom: 24px;
			}
			.stat {
				background: var(--surface);
				border: 1px solid var(--border);
				border-radius: 14px;
				padding: 16px 18px;
			}
			.stat .label {
				display: inline-flex;
				align-items: center;
				gap: 7px;
				color: var(--muted);
				font-family: var(--mono);
				font-size: 10.5px;
				text-transform: uppercase;
				letter-spacing: 0.13em;
			}
			.stat .label .ic {
				width: 14px;
				height: 14px;
				color: var(--teal);
			}
			.stat .who {
				color: var(--ink);
				font-size: 17px;
				font-weight: 600;
				margin-top: 13px;
			}
			.stat .big {
				font-family: var(--mono);
				font-size: 22px;
				font-weight: 600;
				margin-top: 3px;
				letter-spacing: -0.01em;
			}
			.stat .big.pos {
				color: var(--green);
			}
			.stat .big.neg {
				color: var(--coral);
			}
			.stat .big.gold {
				color: var(--teal);
			}

			/* panels */
			.panel {
				background: var(--surface);
				border: 1px solid var(--border);
				border-radius: 16px;
				padding: 20px;
				margin-bottom: 22px;
			}
			.panel h2 {
				display: flex;
				align-items: center;
				gap: 9px;
				font-size: 16px;
				font-weight: 700;
				margin-bottom: 16px;
			}
			.panel h2 .ic {
				width: 18px;
				height: 18px;
				color: var(--teal);
			}

			/* tables */
			#leaderboard,
			#sessions {
				overflow-x: auto;
				-webkit-overflow-scrolling: touch;
			}
			table {
				width: 100%;
				border-collapse: collapse;
				font-size: 14px;
			}
			th,
			td {
				text-align: left;
				padding: 11px 12px;
				white-space: nowrap;
				border-bottom: 1px solid var(--border);
			}
			thead th {
				color: var(--muted);
				font-family: var(--mono);
				font-weight: 500;
				font-size: 10.5px;
				text-transform: uppercase;
				letter-spacing: 0.1em;
				border-bottom: 1px solid var(--border2);
			}
			tbody tr:last-child td {
				border-bottom: 0;
			}
			tbody tr:hover {
				background: rgba(255, 255, 255, 0.02);
			}
			td.num,
			th.num {
				text-align: right;
				font-family: var(--mono);
				font-variant-numeric: tabular-nums;
			}
			.rank {
				color: var(--dim);
				font-family: var(--mono);
				width: 34px;
				font-size: 13px;
			}
			tbody tr:nth-child(-n + 3) .rank {
				color: var(--green);
			}
			td.player {
				font-weight: 600;
			}
			.pos {
				color: var(--green);
			}
			.neg {
				color: var(--coral);
			}
			.gold {
				color: var(--gold);
			}
			.ok {
				color: var(--green);
				display: inline-flex;
				align-items: center;
				gap: 5px;
			}
			.off {
				color: var(--coral);
				font-weight: 600;
				display: inline-flex;
				align-items: center;
				gap: 5px;
			}
			.ok .ic,
			.off .ic {
				width: 14px;
				height: 14px;
			}
			.sdot {
				width: 6px;
				height: 6px;
				border-radius: 50%;
				background: currentColor;
				display: inline-block;
			}

			/* form dots */
			.form {
				display: inline-flex;
				gap: 4px;
			}
			.fd {
				width: 10px;
				height: 10px;
				border-radius: 3px;
				display: inline-block;
			}
			.fd.win {
				background: var(--green);
			}
			.fd.loss {
				background: var(--coral);
			}
			.fd.flat {
				background: var(--dim);
			}

			/* charts */
			.chartbox {
				position: relative;
				height: 300px;
			}
			.grid2 {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 22px;
			}

			/* records + footer */
			.records {
				display: flex;
				align-items: center;
				justify-content: center;
				gap: 8px;
				flex-wrap: wrap;
				color: var(--muted);
				font-size: 13px;
				margin: 6px 0 0;
			}
			.records .ic {
				width: 15px;
				height: 15px;
				color: var(--teal);
			}
			.records b {
				color: var(--ink);
				font-weight: 600;
			}
			.records .up {
				color: var(--green);
			}
			.records .down {
				color: var(--coral);
			}
			.foot {
				color: var(--dim);
				font-family: var(--mono);
				font-size: 11px;
				text-align: center;
				margin-top: 22px;
				line-height: 1.7;
			}
			.credit {
				opacity: 0.6;
				font-size: 10px;
			}
			a {
				color: var(--teal);
			}
			.err {
				background: rgba(224, 146, 139, 0.12);
				border: 1px solid var(--coral);
				color: #f4d4d1;
				padding: 14px;
				border-radius: 12px;
			}

			/* scrollbar */
			::-webkit-scrollbar {
				height: 7px;
				width: 7px;
			}
			::-webkit-scrollbar-thumb {
				background: rgba(255, 255, 255, 0.14);
				border-radius: 7px;
			}

			/* responsive */
			@media (max-width: 760px) {
				.grid2 {
					grid-template-columns: 1fr;
				}
			}
			@media (max-width: 600px) {
				.wrap {
					padding: 20px 13px 48px;
				}
				h1 {
					font-size: 23px;
				}
				/* Last session: stack and left-align instead of pushing results right */
				.recap-inner {
					flex-direction: column;
					align-items: flex-start;
					gap: 7px;
				}
				.recap-results {
					margin-left: 0;
					gap: 4px 18px;
				}
				.cards {
					grid-template-columns: 1fr 1fr;
					gap: 10px;
				}
				.stat {
					padding: 13px 14px;
				}
				.stat .big {
					font-size: 20px;
				}
				.panel {
					padding: 15px 13px;
				}
				.chartbox {
					height: 260px;
				}
				table {
					font-size: 13px;
				}
				th,
				td {
					padding: 9px 9px;
				}
			}
			@media (max-width: 400px) {
				.cards {
					grid-template-columns: 1fr;
				}
			}
		</style>
	</head>
	<body>
		<div class="wrap">
			<div class="brand">
				<img
					class="logo"
					src="logo.png"
					alt="Poker Night logo"
					onerror="this.remove();var f=document.getElementById('logoFallback');if(f)f.style.display='inline-block';"
				/>
				<span class="logo emoji" id="logoFallback" style="display: none"><span data-icon="spade"></span></span>
				<div class="brand-text">
					<h1>Poker Night <span class="chip" data-i18n="standings">Standings</span></h1>
					<p class="sub" id="subtitle" data-i18n="loading">Loading live results…</p>
				</div>
				<div class="seg langseg" id="langSeg">
					<button type="button" data-lang="es">ES</button>
					<button type="button" data-lang="en">EN</button>
				</div>
			</div>

			<div id="error"></div>

			<div id="recap"></div>

			<div class="filterbar">
				<span class="lbl"><span data-icon="eye"></span> <span data-i18n="view">View</span></span>
				<div class="seg" id="viewSeg">
					<button type="button" data-mode="main" class="active" data-i18n="main">
						Main group
					</button>
					<button type="button" data-mode="all" data-i18n="everyone">Everyone</button>
				</div>
			</div>

			<div class="cards" id="statCards"></div>

			<div class="panel">
				<h2><span data-icon="trophy"></span> <span data-i18n="lb_title">Leaderboard — all-time net</span></h2>
				<div id="leaderboard"></div>
			</div>

			<div class="grid2">
				<div class="panel">
					<h2><span data-icon="bar-chart"></span> <span data-i18n="chart_net">Net profit by player</span></h2>
					<div class="chartbox"><canvas id="netChart"></canvas></div>
				</div>
				<div class="panel">
					<h2><span data-icon="trending-up"></span> <span data-i18n="chart_cum">Cumulative standings over time</span></h2>
					<div class="chartbox"><canvas id="cumChart"></canvas></div>
				</div>
			</div>

			<div class="panel">
				<h2><span data-icon="circle-check"></span> <span data-i18n="sessions_title">Session check — totals must equal buy-in × players</span></h2>
				<div id="sessions"></div>
			</div>

			<p class="records" id="records"></p>

			<p class="foot">
				<span data-i18n="footer_refresh"
					>Auto-refreshes from your Google Sheet. Last updated</span
				>
				<span id="updated"></span>.
				<br />
				<span class="credit">
					<a
						href="https://www.flaticon.com/free-icons/poker"
						title="poker icons"
						target="_blank"
						rel="noopener"
						>Poker icons created by Freepik - Flaticon</a
					>
				</span>
			</p>
		</div>

			const ICONS = {"crown":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" class=\"ic\"><path d=\"M11.562 3.266a.5.5 0 0 1 .876 0L15.39 8.87a1 1 0 0 0 1.516.294L21.183 5.5a.5.5 0 0 1 .798.519l-2.834 10.246a1 1 0 0 1-.956.734H5.81a1 1 0 0 1-.957-.734L2.02 6.02a.5.5 0 0 1 .798-.519l4.276 3.664a1 1 0 0 0 1.516-.294z\"/><path d=\"M5 21h14\"/></svg>","trending-down":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" class=\"ic\"><path d=\"M16 17h6v-6\"/><path d=\"m22 17-8.5-8.5-5 5L2 7\"/></svg>","flame":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" class=\"ic\"><path d=\"M12 3q1 4 4 6.5t3 5.5a1 1 0 0 1-14 0 5 5 0 0 1 1-3 1 1 0 0 0 5 0c0-2-1.5-3-1.5-5q0-2 2.5-4\"/></svg>","target":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" class=\"ic\"><circle cx=\"12\" cy=\"12\" r=\"10\"/><circle cx=\"12\" cy=\"12\" r=\"6\"/><circle cx=\"12\" cy=\"12\" r=\"2\"/></svg>","trophy":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" class=\"ic\"><path d=\"M10 14.66v1.626a2 2 0 0 1-.976 1.696A5 5 0 0 0 7 21.978\"/><path d=\"M14 14.66v1.626a2 2 0 0 0 .976 1.696A5 5 0 0 1 17 21.978\"/><path d=\"M18 9h1.5a1 1 0 0 0 0-5H18\"/><path d=\"M4 22h16\"/><path d=\"M6 9a6 6 0 0 0 12 0V3a1 1 0 0 0-1-1H7a1 1 0 0 0-1 1z\"/><path d=\"M6 9H4.5a1 1 0 0 1 0-5H6\"/></svg>","bar-chart":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" class=\"ic\"><path d=\"M3 3v16a2 2 0 0 0 2 2h16\"/><path d=\"M18 17V9\"/><path d=\"M13 17V5\"/><path d=\"M8 17v-3\"/></svg>","trending-up":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" class=\"ic\"><path d=\"M16 7h6v6\"/><path d=\"m22 7-8.5 8.5-5-5L2 17\"/></svg>","circle-check":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" class=\"ic\"><circle cx=\"12\" cy=\"12\" r=\"10\"/><path d=\"m9 12 2 2 4-4\"/></svg>","calendar":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" class=\"ic\"><path d=\"M8 2v4\"/><path d=\"M16 2v4\"/><rect width=\"18\" height=\"18\" x=\"3\" y=\"4\" rx=\"2\"/><path d=\"M3 10h18\"/></svg>","award":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" class=\"ic\"><path d=\"m15.477 12.89 1.515 8.526a.5.5 0 0 1-.81.47l-3.58-2.687a1 1 0 0 0-1.197 0l-3.586 2.686a.5.5 0 0 1-.81-.469l1.514-8.526\"/><circle cx=\"12\" cy=\"8\" r=\"6\"/></svg>","eye":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" class=\"ic\"><path d=\"M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0\"/><circle cx=\"12\" cy=\"12\" r=\"3\"/></svg>","triangle-alert":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" class=\"ic\"><path d=\"m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3\"/><path d=\"M12 9v4\"/><path d=\"M12 17h.01\"/></svg>","spade":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" class=\"ic\"><path d=\"M12 18v4\"/><path d=\"M2 14.499a5.5 5.5 0 0 0 9.591 3.675.6.6 0 0 1 .818.001A5.5 5.5 0 0 0 22 14.5c0-2.29-1.5-4-3-5.5l-5.492-5.312a2 2 0 0 0-3-.02L5 8.999c-1.5 1.5-3 3.2-3 5.5\"/></svg>"};
			function icon(n){ return ICONS[n] || ''; }
			function hydrateIconAttrs(){ document.querySelectorAll('[data-icon]').forEach(function(el){ el.innerHTML = icon(el.getAttribute('data-icon')); }); }
			const money = (n) => {
				const a = Math.abs(n);
				const dec = Number.isInteger(a) ? 0 : 2; // no .00 on whole numbers
				return (
					(n < 0 ? '-$' : '$') +
					a.toLocaleString('en-US', {
						minimumFractionDigits: dec,
						maximumFractionDigits: dec,
					})
				);
			};
			const signed = (n) => (n > 0 ? '+' : '') + money(n);

			function csvUrl(sheet) {
				return `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(
					sheet
				)}`;
			}

			/* Minimal CSV parser that respects quoted fields. */
			function parseCSV(text) {
				const rows = [];
				let row = [],
					field = '',
					q = false;
				for (let i = 0; i < text.length; i++) {
					const c = text[i];
					if (q) {
						if (c === '"') {
							if (text[i + 1] === '"') {
								field += '"';
								i++;
							} else q = false;
						} else field += c;
					} else {
						if (c === '"') q = true;
						else if (c === ',') {
							row.push(field);
							field = '';
						} else if (c === '\n') {
							row.push(field);
							rows.push(row);
							row = [];
							field = '';
						} else if (c === '\r') {
						} else field += c;
					}
				}
				if (field.length || row.length) {
					row.push(field);
					rows.push(row);
				}
				return rows;
			}

			function toNumber(s) {
				if (s == null) return NaN;
				const n = parseFloat(String(s).replace(/[^0-9.\-]/g, ''));
				return isNaN(n) ? NaN : n;
			}

			/* gviz date cells sometimes arrive as Date(yyyy,m,d) — normalize to a key+sortable. */
			function normalizeDate(raw) {
				if (!raw) return { key: '', t: 0 };
				const m = String(raw).match(/Date\((\d+),(\d+),(\d+)/);
				if (m) {
					const d = new Date(+m[1], +m[2], +m[3]);
					return { key: d.toLocaleDateString('en-US'), t: d.getTime() };
				}
				const t = Date.parse(raw);
				return { key: String(raw).trim(), t: isNaN(t) ? 0 : t };
			}

			const palette = [
				'#56c9a6',
				'#5fcf9e',
				'#7fb0e0',
				'#e0928b',
				'#c2a3d6',
				'#e0a96d',
				'#79c7c9',
				'#cdbf86',
				'#9ec1ff',
				'#ff9bb3',
			];

			async function load() {
				if (SPREADSHEET_ID === 'PASTE_YOUR_SPREADSHEET_ID_HERE') {
					showError(
						'Set <code>SPREADSHEET_ID</code> at the top of dashboard.html (the setup script logs it).'
					);
					return;
				}
				let rows;
				try {
					const res = await fetch(csvUrl(RESPONSES_SHEET), {
						cache: 'no-store',
					});
					if (!res.ok) throw new Error('HTTP ' + res.status);
					rows = parseCSV(await res.text());
				} catch (e) {
					showError(
						t('err_read').replace('RESP', RESPONSES_SHEET) +
							'<br><small>' +
							e.message +
							'</small>'
					);
					return;
				}

				// Drop header row. Columns: 0=Timestamp,1=Game date,2=Session #,3=Name,4=Ending amount
				const data = rows
					.slice(1)
					.filter((r) => r.length >= 5 && r[3] && r[3].trim());
				if (!data.length) {
					showError(t('err_none'));
					return;
				}

				const entries = data
					.map((r) => {
						const d = normalizeDate(r[1]);
						const sess = toNumber(r[2]);
						return {
							date: d.key,
							t: d.t,
							session: isNaN(sess) ? 1 : sess,
							skey: d.key + ' #' + (isNaN(sess) ? 1 : sess),
							name: r[3].trim(),
							end: toNumber(r[4]),
							net: toNumber(r[4]) - BUY_IN,
						};
					})
					.filter((e) => !isNaN(e.end));

				allEntries = entries;
				render();

				document.getElementById('updated').textContent =
					new Date().toLocaleTimeString(locale());
				document.getElementById('error').innerHTML = '';
			}

			/* Applies the Main-group/Everyone filter and (re)draws everything
			   that depends on it. Re-runs instantly on toggle — no refetch.
			   The session-check panel always uses ALL players so the
			   buy-in × players balance stays correct. */
			function render() {
				const filtered =
					viewMode === 'all'
						? allEntries
						: allEntries.filter((e) => MAIN_SET.has(e.name.toLowerCase()));

				buildRecap(allEntries);
				buildLeaderboard(filtered);
				buildCumulative(filtered);
				buildSessions(allEntries);
				buildRecords(filtered);

				document.getElementById('subtitle').textContent = `${
					new Set(filtered.map((e) => e.name)).size
				} ${t('players_word')} · ${
					new Set(allEntries.map((e) => e.skey)).size
				} ${t('sessions_word')} · ${t('buyin_word')} ${money(BUY_IN)}`;
			}

			function buildLeaderboard(entries) {
				const by = {};
				entries.forEach((e) => {
					by[e.name] = by[e.name] || {
						name: e.name,
						sessions: 0,
						end: 0,
						net: 0,
						rows: [],
					};
					by[e.name].sessions++;
					by[e.name].end += e.end;
					by[e.name].net += e.net;
					by[e.name].rows.push({
						t: e.t,
						session: e.session,
						net: e.net,
						label: e.date + ' S' + e.session,
					});
				});
				const list = Object.values(by).sort((a, b) => b.net - a.net);
				list.forEach((p) => {
					p.avg = p.net / p.sessions;
					p.rows.sort((a, b) => a.t - b.t || a.session - b.session);
					p.wins = p.rows.filter((r) => r.net > 0).length;
					p.winRate = p.wins / p.sessions;
					// current win streak: consecutive up-nights counting back from latest
					let s = 0;
					for (let i = p.rows.length - 1; i >= 0; i--) {
						if (p.rows[i].net > 0) s++;
						else break;
					}
					p.streak = s;
				});

				if (!list.length) {
					document.getElementById('statCards').innerHTML = '';
					document.getElementById('leaderboard').innerHTML =
						'<p style="color:var(--muted)">' + t('no_players') + '</p>';
					drawBar([]);
					return;
				}

				// stat cards
				const top = list[0],
					bottom = list[list.length - 1];
				const hot = list.reduce(
					(b, p) => (p.streak > (b ? b.streak : 0) ? p : b),
					null
				);
				const eligible = list.filter((p) => p.sessions >= 3);
				const rock = eligible.length
					? eligible.reduce((b, p) =>
							p.winRate > b.winRate ||
							(p.winRate === b.winRate && p.sessions > b.sessions)
								? p
								: b
					  )
					: null;
				const pct = (x) => Math.round(x * 100) + '%';
				document.getElementById('statCards').innerHTML = `
    <div class="stat"><div class="label">${icon('crown')} ${t('champion')}</div><div class="who">${esc(top.name)}</div><div class="big pos">${signed(top.net)}</div></div>
    <div class="stat"><div class="label">${icon('trending-down')} ${t('biggest_loser')}</div><div class="who">${esc(bottom.name)}</div><div class="big neg">${signed(bottom.net)}</div></div>
    <div class="stat"><div class="label">${icon('flame')} ${t('hot_streak')}</div><div class="who">${hot && hot.streak > 0 ? esc(hot.name) : '—'}</div><div class="big gold">${hot && hot.streak > 0 ? hot.streak + ' ' + (hot.streak === 1 ? t('win_one') : t('win_many')) : t('no_streak')}</div></div>
    <div class="stat"><div class="label">${icon('target')} ${t('most_consistent')}</div><div class="who">${rock ? esc(rock.name) : '—'}</div><div class="big gold">${rock ? pct(rock.winRate) + ' ' + t('winrate_word') : t('need_games')}</div></div>`;

				// table
				let html = `<table><thead><tr><th class="rank">#</th><th>${t(
					'col_player'
				)}</th>
    <th>${t('col_form')}</th><th class="num">${t(
					'col_sessions'
				)}</th><th class="num">${t('col_winpct')}</th><th class="num">${t(
					'col_avg'
				)}</th>
    <th class="num">${t('col_net')}</th></tr></thead><tbody>`;
				list.forEach((p, i) => {
					html += `<tr><td class="rank">${i + 1}</td>
      <td class="player">${esc(p.name)}</td>
      <td>${formHtml(p.rows)}</td>
      <td class="num">${p.sessions}</td>
      <td class="num">${pct(p.winRate)}</td>
      <td class="num ${p.avg >= 0 ? 'pos' : 'neg'}">${signed(Math.round(p.avg))}</td>
      <td class="num ${p.net >= 0 ? 'pos' : 'neg'}">${signed(
						p.net
					)}</td></tr>`;
				});
				document.getElementById('leaderboard').innerHTML =
					html + '</tbody></table>';

				drawBar(list);
			}

			let netChart;
			// Draws the net value above/below each bar (v2 style) and no y-axis.
			const barLabels = {
				afterDatasetsDraw(chart) {
					const ctx = chart.ctx;
					const meta = chart.getDatasetMeta(0);
					ctx.save();
					ctx.font = "600 11px 'JetBrains Mono', monospace";
					ctx.textAlign = 'center';
					meta.data.forEach((bar, i) => {
						const v = chart.data.datasets[0].data[i];
						ctx.fillStyle = v >= 0 ? '#5fcf9e' : '#e0928b';
						ctx.fillText(signed(v), bar.x, v >= 0 ? bar.y - 7 : bar.y + 16);
					});
					ctx.restore();
				},
			};
			function drawBar(list) {
				const ctx = document.getElementById('netChart');
				if (netChart) netChart.destroy();
				netChart = new Chart(ctx, {
					type: 'bar',
					data: {
						labels: list.map((p) => p.name),
						datasets: [
							{
								data: list.map((p) => p.net),
								backgroundColor: list.map((p) =>
									p.net >= 0 ? '#5fcf9e' : '#e0928b'
								),
								borderRadius: 6,
							},
						],
					},
					options: {
						responsive: true,
						maintainAspectRatio: false,
						layout: { padding: { top: 22, bottom: 6 } },
						plugins: {
							legend: { display: false },
							tooltip: { callbacks: { label: (c) => signed(c.raw) } },
						},
						scales: {
							x: { ticks: { color: '#86a298' }, grid: { display: false } },
							y: { display: false },
						},
					},
					plugins: [barLabels],
				});
			}

			function buildSessions(entries) {
				const by = {};
				entries.forEach((e) => {
					by[e.skey] = by[e.skey] || {
						date: e.date,
						t: e.t,
						session: e.session,
						players: 0,
						total: 0,
					};
					by[e.skey].players++;
					by[e.skey].total += e.end;
				});
				const list = Object.values(by).sort(
					(a, b) => b.t - a.t || b.session - a.session
				);
				let html = `<table><thead><tr><th>${t('s_date')}</th><th class="num">${t(
					's_session'
				)}</th><th class="num">${t('s_players')}</th>
    <th class="num">${t('s_total')}</th><th class="num">${t(
					's_expected'
				)}</th><th class="num">${t('s_diff')}</th><th>${t(
					's_status'
				)}</th></tr></thead><tbody>`;
				list.forEach((s) => {
					const expected = s.players * BUY_IN,
						diff = s.total - expected,
						ok = Math.abs(diff) < 0.005;
					html += `<tr><td>${esc(s.date)}</td><td class="num">${
						s.session
					}</td><td class="num">${s.players}</td>
      <td class="num">${money(s.total)}</td><td class="num">${money(
						expected
					)}</td>
      <td class="num ${ok ? '' : 'neg'}">${ok ? '—' : signed(diff)}</td>
      <td><span class="${ok ? 'ok' : 'off'}"><span class="sdot"></span> ${
						ok ? t('status_ok') : t('status_off')
					}</span></td></tr>`;
				});
				document.getElementById('sessions').innerHTML =
					html + '</tbody></table>';
			}

			let cumChart;
			function buildCumulative(entries) {
				// Ordered list of unique sessions (date, then session #).
				const seen = {};
				entries.forEach((e) => {
					if (!seen[e.skey])
						seen[e.skey] = { skey: e.skey, t: e.t, session: e.session };
				});
				const order = Object.values(seen).sort(
					(a, b) => a.t - b.t || a.session - b.session
				);
				const keys = order.map((s) => s.skey);
				const labels = order.map((s) => {
					const d = new Date(s.t);
					const dl = isNaN(d.getTime())
						? s.skey.split(' #')[0]
						: d.getMonth() + 1 + '/' + d.getDate();
					return dl + ' S' + s.session;
				});

				const players = [...new Set(entries.map((e) => e.name))];
				const running = {};
				players.forEach((p) => (running[p] = 0));

				const datasets = players.map((p, i) => {
					const pts = keys.map((k) => {
						const e = entries.find((x) => x.name === p && x.skey === k);
						if (e) running[p] += e.net;
						return running[p];
					});
					const col = palette[i % palette.length];
					return {
						label: p,
						data: pts,
						borderColor: col,
						backgroundColor: col,
						tension: 0.25,
						pointRadius: 3,
						borderWidth: 2,
						fill: false,
					};
				});

				const ctx = document.getElementById('cumChart');
				if (cumChart) cumChart.destroy();
				cumChart = new Chart(ctx, {
					type: 'line',
					data: { labels, datasets },
					options: {
						responsive: true,
						maintainAspectRatio: false,
						interaction: { mode: 'nearest', intersect: false },
						plugins: {
							legend: { labels: { color: '#86a298', boxWidth: 12 } },
							tooltip: {
								callbacks: {
									label: (c) => `${c.dataset.label}: ${signed(c.raw)}`,
								},
							},
						},
						scales: {
							x: {
								ticks: { color: '#86a298' },
								grid: { color: 'rgba(255,255,255,0.05)' },
							},
							y: {
								ticks: { color: '#86a298', callback: (v) => money(v) },
								grid: { color: 'rgba(255,255,255,0.06)' },
							},
						},
					},
				});
			}

			/* Last-5-sessions form: green = up night, red = down, grey = even. */
			function formHtml(rows) {
				const last5 = rows.slice(-5);
				return (
					'<span class="form">' +
					last5
						.map((r) => {
							const cls =
								r.net > 0 ? 'fd win' : r.net < 0 ? 'fd loss' : 'fd flat';
							return `<span class="${cls}" title="${esc(r.label)}: ${signed(
								r.net
							)}"></span>`;
						})
						.join('') +
					'</span>'
				);
			}

			/* All-time single-session records for the current view. */
			function buildRecords(entries) {
				const el = document.getElementById('records');
				if (!entries.length) {
					el.innerHTML = '';
					return;
				}
				let best = entries[0],
					worst = entries[0];
				entries.forEach((e) => {
					if (e.net > best.net) best = e;
					if (e.net < worst.net) worst = e;
				});
				el.innerHTML =
					`${icon('award')} ${t('records_word')} — ${t('biggest_win')}: <b>${esc(
						best.name
					)}</b> ` +
					`<span class="up">${signed(best.net)}</span> (${esc(best.date)}) · ` +
					`${t('biggest_loss')}: <b>${esc(worst.name)}</b> ` +
					`<span class="down">${signed(worst.net)}</span> (${esc(worst.date)})`;
			}

			/* "Last session" recap banner — the most recent (date, session),
			   using ALL players (it's a factual snapshot of that night). */
			function buildRecap(entries) {
				const el = document.getElementById('recap');
				if (!entries.length) {
					el.innerHTML = '';
					return;
				}
				let maxT = -Infinity,
					maxS = -Infinity;
				entries.forEach((e) => {
					if (e.t > maxT || (e.t === maxT && e.session > maxS)) {
						maxT = e.t;
						maxS = e.session;
					}
				});
				const last = entries.filter(
					(e) => e.t === maxT && e.session === maxS
				);
				const sorted = [...last].sort((a, b) => b.net - a.net);
				const w = sorted[0],
					l = sorted[sorted.length - 1];
				const d = new Date(maxT);
				const dateLabel = isNaN(d.getTime())
					? last[0].date
					: d.toLocaleDateString(locale(), {
							weekday: 'short',
							month: 'short',
							day: 'numeric',
					  });
				el.innerHTML = `<div class="recap-inner">
          <span class="recap-label">${icon('calendar')} ${t('last_session')}</span>
          <span class="recap-meta">${esc(dateLabel)} · ${t('session_word')} ${
					last[0].session
				} · ${last.length} ${t('players_word')}</span>
          <span class="recap-results"><span class="recap-res"><span class="rw">${t(
						'winner_word'
					)}</span> <b>${esc(w.name)}</b> <span class="recap-win">${signed(
					w.net
				)}</span></span><span class="recap-res"><span class="rw">${t(
						'loser_word'
					)}</span> <b>${esc(l.name)}</b> <span class="recap-loss">${signed(
					l.net
				)}</span></span></span>
        </div>`;
			}

			function esc(s) {
				return String(s).replace(
					/[&<>]/g,
					(c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])
				);
			}
			function showError(html) {
				document.getElementById(
					'error'
				).innerHTML = `<div class="err">${html}</div>`;
			}

			// View toggle (Main group / Everyone) — re-renders from cached data.
			document
				.getElementById('viewSeg')
				.addEventListener('click', (e) => {
					const btn = e.target.closest('button');
					if (!btn) return;
					viewMode = btn.dataset.mode;
					e.currentTarget
						.querySelectorAll('button')
						.forEach((b) => b.classList.toggle('active', b === btn));
					if (allEntries.length) render();
				});

			// Language toggle (ES / EN) — persists the choice and re-renders.
			document.getElementById('langSeg').addEventListener('click', (e) => {
				const btn = e.target.closest('button');
				if (!btn) return;
				lang = btn.dataset.lang;
				try {
					localStorage.setItem('pokerLang', lang);
				} catch (err) {}
				setLangButtons();
				applyStaticI18n();
				if (allEntries.length) render();
			});

			// Initial paint: static icons + language (before data arrives).
			hydrateIconAttrs();
			setLangButtons();
			applyStaticI18n();

			load();
			setInterval(load, REFRESH_MS);
		</script>
	</body>
</html>
