<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1"
		/>
		<title>Poker Night — Standings</title>
		<link rel="icon" type="image/png" href="logo.png" />
		<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
		<style>
			:root {
				--felt: #0b3d2e;
				--felt2: #0e4a37;
				--gold: #e8c372;
				--win: #3fb27f;
				--loss: #e06c75;
				--ink: #f4f1e8;
				--muted: #a9b8b0;
				--card: #10433370;
			}
			* {
				box-sizing: border-box;
			}
			body {
				margin: 0;
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
					sans-serif;
				color: var(--ink);
				background: radial-gradient(
					120% 120% at 50% 0%,
					var(--felt2),
					var(--felt) 60%,
					#072117
				);
				min-height: 100vh;
				overflow-x: hidden;
				-webkit-text-size-adjust: 100%;
			}
			.wrap {
				max-width: 1100px;
				margin: 0 auto;
				padding: 28px 18px 60px;
			}
			.brand {
				display: flex;
				align-items: center;
				gap: 16px;
				margin: 0 0 24px;
				flex-wrap: wrap;
			}
			.langseg {
				margin-left: auto;
			}
			.langseg button {
				padding: 5px 11px;
				font-size: 12px;
			}
			.brand .logo {
				width: 56px;
				height: 56px;
				flex: 0 0 auto;
				object-fit: contain;
				filter: drop-shadow(0 3px 8px #0007);
			}
			.brand .logo.emoji {
				font-size: 46px;
				line-height: 1;
				text-align: center;
			}
			h1 {
				font-size: 30px;
				margin: 0;
				letter-spacing: 0.5px;
				font-weight: 800;
			}
			h1 .chip {
				color: var(--gold);
			}
			.sub {
				color: var(--muted);
				margin: 3px 0 0;
				font-size: 14px;
			}
			.cards {
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
				gap: 14px;
				margin-bottom: 26px;
			}
			.stat {
				background: var(--card);
				border: 1px solid #ffffff14;
				border-radius: 14px;
				padding: 16px 18px;
				backdrop-filter: blur(3px);
			}
			.stat .label {
				color: var(--muted);
				font-size: 12px;
				text-transform: uppercase;
				letter-spacing: 0.8px;
			}
			.stat .big {
				font-size: 24px;
				font-weight: 700;
				margin-top: 6px;
			}
			.stat .big.gold {
				color: var(--gold);
			}
			.records {
				text-align: center;
				color: var(--muted);
				font-size: 13px;
				margin: 4px 0 0;
			}
			.records b {
				color: var(--ink);
				font-weight: 600;
			}
			.records .up {
				color: var(--win);
			}
			.records .down {
				color: var(--loss);
			}
			.stat .who {
				color: var(--gold);
				font-size: 15px;
				margin-top: 2px;
			}
			.panel {
				background: var(--card);
				border: 1px solid #ffffff14;
				border-radius: 14px;
				padding: 18px;
				margin-bottom: 22px;
			}
			.panel h2 {
				font-size: 16px;
				margin: 0 0 14px;
				color: var(--gold);
				letter-spacing: 0.4px;
			}
			/* Tables can be wider than a phone; let each one scroll on its own. */
			#leaderboard,
			#sessions {
				overflow-x: auto;
				-webkit-overflow-scrolling: touch;
				scrollbar-width: thin;
			}
			#leaderboard::-webkit-scrollbar,
			#sessions::-webkit-scrollbar {
				height: 6px;
			}
			#leaderboard::-webkit-scrollbar-thumb,
			#sessions::-webkit-scrollbar-thumb {
				background: #ffffff2e;
				border-radius: 6px;
			}
			table {
				width: 100%;
				border-collapse: collapse;
				font-size: 14px;
			}
			th,
			td {
				text-align: left;
				padding: 9px 10px;
				border-bottom: 1px solid #ffffff12;
				white-space: nowrap;
			}
			th {
				color: var(--muted);
				font-weight: 600;
				font-size: 12px;
				text-transform: uppercase;
				letter-spacing: 0.6px;
			}
			td.num,
			th.num {
				text-align: right;
				font-variant-numeric: tabular-nums;
			}
			.rank {
				color: var(--gold);
				font-weight: 700;
				width: 34px;
			}
			.pos {
				color: var(--win);
				font-weight: 700;
			}
			.neg {
				color: var(--loss);
				font-weight: 700;
			}
			.ok {
				color: var(--win);
			}
			.off {
				color: var(--loss);
				font-weight: 700;
			}
			.chartbox {
				position: relative;
				height: 320px;
			}
			.grid2 {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 22px;
			}
			@media (max-width: 760px) {
				.grid2 {
					grid-template-columns: 1fr;
				}
			}
			@media (max-width: 600px) {
				.wrap {
					padding: 18px 12px 44px;
				}
				.brand {
					gap: 12px;
					margin-bottom: 18px;
				}
				.brand .logo {
					width: 44px;
					height: 44px;
				}
				.brand .logo.emoji {
					font-size: 38px;
				}
				h1 {
					font-size: 22px;
				}
				.sub {
					font-size: 13px;
				}
				.cards {
					grid-template-columns: 1fr 1fr;
					gap: 10px;
				}
				.stat {
					padding: 12px 13px;
				}
				.stat .big {
					font-size: 20px;
				}
				.stat .who {
					font-size: 14px;
				}
				.panel {
					padding: 14px 12px;
					margin-bottom: 16px;
				}
				.chartbox {
					height: 260px;
				}
				table {
					font-size: 13px;
				}
				th,
				td {
					padding: 8px 9px;
				}
			}
			@media (max-width: 380px) {
				.cards {
					grid-template-columns: 1fr;
				}
			}
			#recap:empty {
				display: none;
			}
			.recap-inner {
				display: flex;
				flex-wrap: wrap;
				align-items: center;
				gap: 8px 18px;
				background: linear-gradient(90deg, #11463485, #0c352766);
				border: 1px solid #ffffff1f;
				border-left: 3px solid var(--gold);
				border-radius: 12px;
				padding: 12px 16px;
				margin: 0 0 18px;
				font-size: 14px;
			}
			.recap-label {
				color: var(--gold);
				font-weight: 700;
				text-transform: uppercase;
				font-size: 12px;
				letter-spacing: 0.8px;
			}
			.recap-meta {
				color: var(--muted);
			}
			.recap-win {
				color: var(--win);
				font-weight: 700;
			}
			.recap-loss {
				color: var(--loss);
				font-weight: 700;
			}
			.form {
				display: inline-flex;
				gap: 3px;
			}
			.fd {
				width: 9px;
				height: 9px;
				border-radius: 50%;
				display: inline-block;
			}
			.fd.win {
				background: var(--win);
			}
			.fd.loss {
				background: var(--loss);
			}
			.fd.flat {
				background: #7d8b84;
			}
			.filterbar {
				display: flex;
				align-items: center;
				gap: 10px;
				margin: 0 0 18px;
				flex-wrap: wrap;
			}
			.filterbar .lbl {
				color: var(--muted);
				font-size: 12px;
				text-transform: uppercase;
				letter-spacing: 0.8px;
			}
			.seg {
				display: inline-flex;
				background: #0c3527;
				border: 1px solid #ffffff1f;
				border-radius: 10px;
				padding: 3px;
				gap: 3px;
			}
			.seg button {
				appearance: none;
				border: 0;
				background: transparent;
				color: var(--muted);
				font: inherit;
				font-size: 13px;
				font-weight: 600;
				padding: 7px 14px;
				border-radius: 8px;
				cursor: pointer;
				transition: background 0.15s, color 0.15s;
			}
			.seg button:hover {
				color: var(--ink);
			}
			.seg button.active {
				background: var(--gold);
				color: #1a1205;
			}
			.err {
				background: #5a1d1d;
				border: 1px solid #e06c75;
				color: #ffd7d7;
				padding: 14px;
				border-radius: 10px;
			}
			.foot {
				color: var(--muted);
				font-size: 12px;
				text-align: center;
				margin-top: 20px;
			}
			.credit {
				opacity: 0.6;
				font-size: 11px;
			}
			a {
				color: var(--gold);
			}
			.medal {
				margin-right: 4px;
			}
		</style>
	</head>
	<body>
		<div class="wrap">
			<div class="brand">
				<img
					class="logo"
					src="logo.png"
					alt="Poker Night logo"
					onerror="this.remove();var f=document.getElementById('logoFallback');if(f)f.style.display='inline-block';"
				/>
				<span class="logo emoji" id="logoFallback" style="display: none">🃏</span>
				<div>
					<h1>Poker Night <span class="chip" data-i18n="standings">Standings</span></h1>
					<p class="sub" id="subtitle" data-i18n="loading">Loading live results…</p>
				</div>
				<div class="seg langseg" id="langSeg">
					<button type="button" data-lang="es">ES</button>
					<button type="button" data-lang="en">EN</button>
				</div>
			</div>

			<div id="error"></div>

			<div id="recap"></div>

			<div class="filterbar">
				<span class="lbl" data-i18n="view">View</span>
				<div class="seg" id="viewSeg">
					<button type="button" data-mode="main" class="active" data-i18n="main">
						Main group
					</button>
					<button type="button" data-mode="all" data-i18n="all">Everyone</button>
				</div>
			</div>

			<div class="cards" id="statCards"></div>

			<div class="panel">
				<h2 data-i18n="lb_title">Leaderboard — all-time net</h2>
				<div id="leaderboard"></div>
			</div>

			<div class="grid2">
				<div class="panel">
					<h2 data-i18n="chart_net">Net profit by player</h2>
					<div class="chartbox"><canvas id="netChart"></canvas></div>
				</div>
				<div class="panel">
					<h2 data-i18n="chart_cum">Cumulative standings over time</h2>
					<div class="chartbox"><canvas id="cumChart"></canvas></div>
				</div>
			</div>

			<div class="panel">
				<h2 data-i18n="sessions_title">Session check — totals must equal buy-in × players</h2>
				<div id="sessions"></div>
			</div>

			<p class="records" id="records"></p>

			<p class="foot">
				<span data-i18n="footer_refresh"
					>Auto-refreshes from your Google Sheet. Last updated</span
				>
				<span id="updated"></span>.
				<br />
				<span class="credit">
					<a
						href="https://www.flaticon.com/free-icons/poker"
						title="poker icons"
						target="_blank"
						rel="noopener"
						>Poker icons created by Freepik - Flaticon</a
					>
				</span>
			</p>
		</div>

		<script>
			/* ============================================================
   CONFIG — paste your spreadsheet ID here (the script logs it).
   ============================================================ */
			const SPREADSHEET_ID =
				'1sdli0MIdzyLiwStvG1soNHKoFrf4xspQl_MUw6_8BJs';
			const BUY_IN = 975; // must match the Config tab in your sheet
			const RESPONSES_SHEET = 'Form Responses 1';
			const REFRESH_MS = 60000; // re-pull every 60s

			// The regulars. Default view shows only these; "Everyone" shows all
			// who have ever played (guests included). Case-insensitive match.
			const MAIN_PLAYERS = [
				'Abraham',
				'Pedro',
				'Victor',
				'Yordi',
				'Mundi',
				'Ignacio',
				'Daniel',
			];
			const MAIN_SET = new Set(MAIN_PLAYERS.map((n) => n.toLowerCase()));

			let viewMode = 'main'; // 'main' | 'all'
			let allEntries = []; // every parsed row, kept so the toggle is instant

			/* ---- Language (default Spanish, remembered in localStorage) ---- */
			let lang = (function () {
				try {
					return localStorage.getItem('pokerLang') || 'es';
				} catch (e) {
					return 'es';
				}
			})();

			const I18N = {
				es: {
					standings: 'Clasificación',
					loading: 'Cargando resultados…',
					view: 'Vista',
					main: 'Grupo principal',
					everyone: 'Todos',
					lb_title: 'Clasificación — neto histórico',
					chart_net: 'Ganancia neta por jugador',
					chart_cum: 'Evolución acumulada',
					sessions_title:
						'Control de sesiones — el total debe ser entrada × jugadores',
					footer_refresh:
						'Se actualiza solo desde tu Google Sheet. Última actualización',
					champion: 'Campeón',
					biggest_loser: 'Mayor perdedor',
					hot_streak: 'Racha',
					most_consistent: 'Más constante',
					win_one: 'victoria',
					win_many: 'victorias',
					no_streak: 'sin racha',
					winrate_word: 'aciertos',
					need_games: 'faltan 3+ partidas',
					col_player: 'Jugador',
					col_form: 'Forma',
					col_sessions: 'Sesiones',
					col_winpct: 'Victorias %',
					col_avg: 'Prom. / sesión',
					col_net: 'Neto',
					no_players: 'Aún no hay jugadores en esta vista.',
					last_session: 'Última sesión',
					session_word: 'Sesión',
					players_word: 'jugadores',
					sessions_word: 'sesiones',
					buyin_word: 'entrada',
					records_word: 'Récords',
					biggest_win: 'Mayor victoria',
					biggest_loss: 'Mayor derrota',
					s_date: 'Fecha',
					s_session: 'Sesión',
					s_players: 'Jugadores',
					s_total: 'Total final',
					s_expected: 'Esperado',
					s_diff: 'Dif.',
					s_status: 'Estado',
					status_ok: 'OK',
					status_off: 'Revisar',
					err_read:
						'No se pudo leer la hoja. Asegúrate de que esté compartida como <b>Cualquiera con el enlace → Lector</b>, que el ID sea correcto y que la pestaña se llame <code>RESP</code>.',
					err_none:
						'Aún no hay respuestas — envía una sesión por el formulario y recarga.',
				},
				en: {
					standings: 'Standings',
					loading: 'Loading live results…',
					view: 'View',
					main: 'Main group',
					everyone: 'Everyone',
					lb_title: 'Leaderboard — all-time net',
					chart_net: 'Net profit by player',
					chart_cum: 'Cumulative standings over time',
					sessions_title:
						'Session check — totals must equal buy-in × players',
					footer_refresh: 'Auto-refreshes from your Google Sheet. Last updated',
					champion: 'Champion',
					biggest_loser: 'Biggest loser',
					hot_streak: 'Hot streak',
					most_consistent: 'Most consistent',
					win_one: 'win',
					win_many: 'wins',
					no_streak: 'no streak',
					winrate_word: 'win rate',
					need_games: '3+ games needed',
					col_player: 'Player',
					col_form: 'Form',
					col_sessions: 'Sessions',
					col_winpct: 'Win %',
					col_avg: 'Avg / session',
					col_net: 'Net profit',
					no_players: 'No players in this view yet.',
					last_session: 'Last session',
					session_word: 'Session',
					players_word: 'players',
					sessions_word: 'sessions',
					buyin_word: 'buy-in',
					records_word: 'Records',
					biggest_win: 'Biggest win',
					biggest_loss: 'Biggest loss',
					s_date: 'Date',
					s_session: 'Session',
					s_players: 'Players',
					s_total: 'Total ending',
					s_expected: 'Expected',
					s_diff: 'Diff',
					s_status: 'Status',
					status_ok: 'OK',
					status_off: 'Off — check inputs',
					err_read:
						"Couldn't read the sheet. Make sure it's shared as <b>Anyone with the link → Viewer</b>, the ID is correct, and the tab is named <code>RESP</code>.",
					err_none:
						'No responses yet — submit a session through the form and refresh.',
				},
			};

			function t(k) {
				if (I18N[lang] && I18N[lang][k] != null) return I18N[lang][k];
				return I18N.en[k] != null ? I18N.en[k] : k;
			}
			function locale() {
				return lang === 'es' ? 'es-ES' : 'en-US';
			}
			function applyStaticI18n() {
				document.querySelectorAll('[data-i18n]').forEach((el) => {
					el.textContent = t(el.getAttribute('data-i18n'));
				});
				document.documentElement.lang = lang;
			}
			function setLangButtons() {
				document.querySelectorAll('#langSeg button').forEach((b) => {
					b.classList.toggle('active', b.dataset.lang === lang);
				});
			}

			const money = (n) =>
				(n < 0 ? '-$' : '$') +
				Math.abs(n).toLocaleString('en-US', {
					minimumFractionDigits: 2,
					maximumFractionDigits: 2,
				});
			const signed = (n) => (n > 0 ? '+' : '') + money(n);

			function csvUrl(sheet) {
				return `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(
					sheet
				)}`;
			}

			/* Minimal CSV parser that respects quoted fields. */
			function parseCSV(text) {
				const rows = [];
				let row = [],
					field = '',
					q = false;
				for (let i = 0; i < text.length; i++) {
					const c = text[i];
					if (q) {
						if (c === '"') {
							if (text[i + 1] === '"') {
								field += '"';
								i++;
							} else q = false;
						} else field += c;
					} else {
						if (c === '"') q = true;
						else if (c === ',') {
							row.push(field);
							field = '';
						} else if (c === '\n') {
							row.push(field);
							rows.push(row);
							row = [];
							field = '';
						} else if (c === '\r') {
						} else field += c;
					}
				}
				if (field.length || row.length) {
					row.push(field);
					rows.push(row);
				}
				return rows;
			}

			function toNumber(s) {
				if (s == null) return NaN;
				const n = parseFloat(String(s).replace(/[^0-9.\-]/g, ''));
				return isNaN(n) ? NaN : n;
			}

			/* gviz date cells sometimes arrive as Date(yyyy,m,d) — normalize to a key+sortable. */
			function normalizeDate(raw) {
				if (!raw) return { key: '', t: 0 };
				const m = String(raw).match(/Date\((\d+),(\d+),(\d+)/);
				if (m) {
					const d = new Date(+m[1], +m[2], +m[3]);
					return { key: d.toLocaleDateString('en-US'), t: d.getTime() };
				}
				const t = Date.parse(raw);
				return { key: String(raw).trim(), t: isNaN(t) ? 0 : t };
			}

			const palette = [
				'#e8c372',
				'#3fb27f',
				'#5aa9e6',
				'#e06c75',
				'#c39bd3',
				'#f5a35c',
				'#7ed6c1',
				'#d6c97e',
				'#9ec1ff',
				'#ff9bb3',
			];

			async function load() {
				if (SPREADSHEET_ID === 'PASTE_YOUR_SPREADSHEET_ID_HERE') {
					showError(
						'Set <code>SPREADSHEET_ID</code> at the top of dashboard.html (the setup script logs it).'
					);
					return;
				}
				let rows;
				try {
					const res = await fetch(csvUrl(RESPONSES_SHEET), {
						cache: 'no-store',
					});
					if (!res.ok) throw new Error('HTTP ' + res.status);
					rows = parseCSV(await res.text());
				} catch (e) {
					showError(
						t('err_read').replace('RESP', RESPONSES_SHEET) +
							'<br><small>' +
							e.message +
							'</small>'
					);
					return;
				}

				// Drop header row. Columns: 0=Timestamp,1=Game date,2=Session #,3=Name,4=Ending amount
				const data = rows
					.slice(1)
					.filter((r) => r.length >= 5 && r[3] && r[3].trim());
				if (!data.length) {
					showError(t('err_none'));
					return;
				}

				const entries = data
					.map((r) => {
						const d = normalizeDate(r[1]);
						const sess = toNumber(r[2]);
						return {
							date: d.key,
							t: d.t,
							session: isNaN(sess) ? 1 : sess,
							skey: d.key + ' #' + (isNaN(sess) ? 1 : sess),
							name: r[3].trim(),
							end: toNumber(r[4]),
							net: toNumber(r[4]) - BUY_IN,
						};
					})
					.filter((e) => !isNaN(e.end));

				allEntries = entries;
				render();

				document.getElementById('updated').textContent =
					new Date().toLocaleTimeString(locale());
				document.getElementById('error').innerHTML = '';
			}

			/* Applies the Main-group/Everyone filter and (re)draws everything
			   that depends on it. Re-runs instantly on toggle — no refetch.
			   The session-check panel always uses ALL players so the
			   buy-in × players balance stays correct. */
			function render() {
				const filtered =
					viewMode === 'all'
						? allEntries
						: allEntries.filter((e) => MAIN_SET.has(e.name.toLowerCase()));

				buildRecap(allEntries);
				buildLeaderboard(filtered);
				buildCumulative(filtered);
				buildSessions(allEntries);
				buildRecords(filtered);

				document.getElementById('subtitle').textContent = `${
					new Set(filtered.map((e) => e.name)).size
				} ${t('players_word')} · ${
					new Set(allEntries.map((e) => e.skey)).size
				} ${t('sessions_word')} · ${t('buyin_word')} ${money(BUY_IN)}`;
			}

			function buildLeaderboard(entries) {
				const by = {};
				entries.forEach((e) => {
					by[e.name] = by[e.name] || {
						name: e.name,
						sessions: 0,
						end: 0,
						net: 0,
						rows: [],
					};
					by[e.name].sessions++;
					by[e.name].end += e.end;
					by[e.name].net += e.net;
					by[e.name].rows.push({
						t: e.t,
						session: e.session,
						net: e.net,
						label: e.date + ' S' + e.session,
					});
				});
				const list = Object.values(by).sort((a, b) => b.net - a.net);
				list.forEach((p) => {
					p.avg = p.net / p.sessions;
					p.rows.sort((a, b) => a.t - b.t || a.session - b.session);
					p.wins = p.rows.filter((r) => r.net > 0).length;
					p.winRate = p.wins / p.sessions;
					// current win streak: consecutive up-nights counting back from latest
					let s = 0;
					for (let i = p.rows.length - 1; i >= 0; i--) {
						if (p.rows[i].net > 0) s++;
						else break;
					}
					p.streak = s;
				});

				if (!list.length) {
					document.getElementById('statCards').innerHTML = '';
					document.getElementById('leaderboard').innerHTML =
						'<p style="color:var(--muted)">' + t('no_players') + '</p>';
					drawBar([]);
					return;
				}

				// stat cards
				const top = list[0],
					bottom = list[list.length - 1];
				const medals = ['🥇', '🥈', '🥉'];
				const hot = list.reduce(
					(b, p) => (p.streak > (b ? b.streak : 0) ? p : b),
					null
				);
				const eligible = list.filter((p) => p.sessions >= 3);
				const rock = eligible.length
					? eligible.reduce((b, p) =>
							p.winRate > b.winRate ||
							(p.winRate === b.winRate && p.sessions > b.sessions)
								? p
								: b
					  )
					: null;
				const pct = (x) => Math.round(x * 100) + '%';
				document.getElementById('statCards').innerHTML = `
    <div class="stat"><div class="label">👑 ${t('champion')}</div><div class="who">${esc(top.name)}</div><div class="big pos">${signed(top.net)}</div></div>
    <div class="stat"><div class="label">💀 ${t('biggest_loser')}</div><div class="who">${esc(bottom.name)}</div><div class="big neg">${signed(bottom.net)}</div></div>
    <div class="stat"><div class="label">🔥 ${t('hot_streak')}</div><div class="who">${hot && hot.streak > 0 ? esc(hot.name) : '—'}</div><div class="big gold">${hot && hot.streak > 0 ? hot.streak + ' ' + (hot.streak === 1 ? t('win_one') : t('win_many')) : t('no_streak')}</div></div>
    <div class="stat"><div class="label">🪨 ${t('most_consistent')}</div><div class="who">${rock ? esc(rock.name) : '—'}</div><div class="big gold">${rock ? pct(rock.winRate) + ' ' + t('winrate_word') : t('need_games')}</div></div>`;

				// table
				let html = `<table><thead><tr><th class="rank">#</th><th>${t(
					'col_player'
				)}</th>
    <th>${t('col_form')}</th><th class="num">${t(
					'col_sessions'
				)}</th><th class="num">${t('col_winpct')}</th><th class="num">${t(
					'col_avg'
				)}</th>
    <th class="num">${t('col_net')}</th></tr></thead><tbody>`;
				list.forEach((p, i) => {
					html += `<tr><td class="rank">${
						i < 3 ? '<span class="medal">' + medals[i] + '</span>' : i + 1
					}</td>
      <td>${esc(p.name)}</td>
      <td>${formHtml(p.rows)}</td>
      <td class="num">${p.sessions}</td>
      <td class="num">${pct(p.winRate)}</td>
      <td class="num ${p.avg >= 0 ? 'pos' : 'neg'}">${signed(p.avg)}</td>
      <td class="num ${p.net >= 0 ? 'pos' : 'neg'}">${signed(
						p.net
					)}</td></tr>`;
				});
				document.getElementById('leaderboard').innerHTML =
					html + '</tbody></table>';

				drawBar(list);
			}

			let netChart;
			function drawBar(list) {
				const ctx = document.getElementById('netChart');
				if (netChart) netChart.destroy();
				netChart = new Chart(ctx, {
					type: 'bar',
					data: {
						labels: list.map((p) => p.name),
						datasets: [
							{
								data: list.map((p) => p.net),
								backgroundColor: list.map((p) =>
									p.net >= 0 ? '#3fb27f' : '#e06c75'
								),
								borderRadius: 6,
							},
						],
					},
					options: {
						responsive: true,
						maintainAspectRatio: false,
						plugins: {
							legend: { display: false },
							tooltip: { callbacks: { label: (c) => signed(c.raw) } },
						},
						scales: {
							x: { ticks: { color: '#cfe0d8' }, grid: { display: false } },
							y: {
								ticks: { color: '#cfe0d8', callback: (v) => money(v) },
								grid: { color: '#ffffff14' },
							},
						},
					},
				});
			}

			function buildSessions(entries) {
				const by = {};
				entries.forEach((e) => {
					by[e.skey] = by[e.skey] || {
						date: e.date,
						t: e.t,
						session: e.session,
						players: 0,
						total: 0,
					};
					by[e.skey].players++;
					by[e.skey].total += e.end;
				});
				const list = Object.values(by).sort(
					(a, b) => b.t - a.t || b.session - a.session
				);
				let html = `<table><thead><tr><th>${t('s_date')}</th><th class="num">${t(
					's_session'
				)}</th><th class="num">${t('s_players')}</th>
    <th class="num">${t('s_total')}</th><th class="num">${t(
					's_expected'
				)}</th><th class="num">${t('s_diff')}</th><th>${t(
					's_status'
				)}</th></tr></thead><tbody>`;
				list.forEach((s) => {
					const expected = s.players * BUY_IN,
						diff = s.total - expected,
						ok = Math.abs(diff) < 0.005;
					html += `<tr><td>${esc(s.date)}</td><td class="num">${
						s.session
					}</td><td class="num">${s.players}</td>
      <td class="num">${money(s.total)}</td><td class="num">${money(
						expected
					)}</td>
      <td class="num ${ok ? '' : 'off'}">${
						ok ? '—' : signed(diff)
					}</td>
      <td class="${ok ? 'ok' : 'off'}">${
						ok ? '✅ ' + t('status_ok') : '⚠️ ' + t('status_off')
					}</td></tr>`;
				});
				document.getElementById('sessions').innerHTML =
					html + '</tbody></table>';
			}

			let cumChart;
			function buildCumulative(entries) {
				// Ordered list of unique sessions (date, then session #).
				const seen = {};
				entries.forEach((e) => {
					if (!seen[e.skey])
						seen[e.skey] = { skey: e.skey, t: e.t, session: e.session };
				});
				const order = Object.values(seen).sort(
					(a, b) => a.t - b.t || a.session - b.session
				);
				const keys = order.map((s) => s.skey);
				const labels = order.map((s) => {
					const d = new Date(s.t);
					const dl = isNaN(d.getTime())
						? s.skey.split(' #')[0]
						: d.getMonth() + 1 + '/' + d.getDate();
					return dl + ' S' + s.session;
				});

				const players = [...new Set(entries.map((e) => e.name))];
				const running = {};
				players.forEach((p) => (running[p] = 0));

				const datasets = players.map((p, i) => {
					const pts = keys.map((k) => {
						const e = entries.find((x) => x.name === p && x.skey === k);
						if (e) running[p] += e.net;
						return running[p];
					});
					const col = palette[i % palette.length];
					return {
						label: p,
						data: pts,
						borderColor: col,
						backgroundColor: col,
						tension: 0.25,
						pointRadius: 3,
						borderWidth: 2,
						fill: false,
					};
				});

				const ctx = document.getElementById('cumChart');
				if (cumChart) cumChart.destroy();
				cumChart = new Chart(ctx, {
					type: 'line',
					data: { labels, datasets },
					options: {
						responsive: true,
						maintainAspectRatio: false,
						interaction: { mode: 'nearest', intersect: false },
						plugins: {
							legend: { labels: { color: '#cfe0d8', boxWidth: 12 } },
							tooltip: {
								callbacks: {
									label: (c) => `${c.dataset.label}: ${signed(c.raw)}`,
								},
							},
						},
						scales: {
							x: {
								ticks: { color: '#cfe0d8' },
								grid: { color: '#ffffff10' },
							},
							y: {
								ticks: { color: '#cfe0d8', callback: (v) => money(v) },
								grid: { color: '#ffffff14' },
							},
						},
					},
				});
			}

			/* Last-5-sessions form: green = up night, red = down, grey = even. */
			function formHtml(rows) {
				const last5 = rows.slice(-5);
				return (
					'<span class="form">' +
					last5
						.map((r) => {
							const cls =
								r.net > 0 ? 'fd win' : r.net < 0 ? 'fd loss' : 'fd flat';
							return `<span class="${cls}" title="${esc(r.label)}: ${signed(
								r.net
							)}"></span>`;
						})
						.join('') +
					'</span>'
				);
			}

			/* All-time single-session records for the current view. */
			function buildRecords(entries) {
				const el = document.getElementById('records');
				if (!entries.length) {
					el.innerHTML = '';
					return;
				}
				let best = entries[0],
					worst = entries[0];
				entries.forEach((e) => {
					if (e.net > best.net) best = e;
					if (e.net < worst.net) worst = e;
				});
				el.innerHTML =
					`🏅 ${t('records_word')} — ${t('biggest_win')}: <b>${esc(
						best.name
					)}</b> ` +
					`<span class="up">${signed(best.net)}</span> (${esc(best.date)}) · ` +
					`${t('biggest_loss')}: <b>${esc(worst.name)}</b> ` +
					`<span class="down">${signed(worst.net)}</span> (${esc(worst.date)})`;
			}

			/* "Last session" recap banner — the most recent (date, session),
			   using ALL players (it's a factual snapshot of that night). */
			function buildRecap(entries) {
				const el = document.getElementById('recap');
				if (!entries.length) {
					el.innerHTML = '';
					return;
				}
				let maxT = -Infinity,
					maxS = -Infinity;
				entries.forEach((e) => {
					if (e.t > maxT || (e.t === maxT && e.session > maxS)) {
						maxT = e.t;
						maxS = e.session;
					}
				});
				const last = entries.filter(
					(e) => e.t === maxT && e.session === maxS
				);
				const sorted = [...last].sort((a, b) => b.net - a.net);
				const w = sorted[0],
					l = sorted[sorted.length - 1];
				const d = new Date(maxT);
				const dateLabel = isNaN(d.getTime())
					? last[0].date
					: d.toLocaleDateString(locale(), {
							weekday: 'short',
							month: 'short',
							day: 'numeric',
					  });
				el.innerHTML = `<div class="recap-inner">
          <span class="recap-label">🃏 ${t('last_session')}</span>
          <span class="recap-meta">${esc(dateLabel)} · ${t('session_word')} ${
					last[0].session
				} · ${last.length} ${t('players_word')}</span>
          <span class="recap-win">🏆 ${esc(w.name)} ${signed(w.net)}</span>
          <span class="recap-loss">💀 ${esc(l.name)} ${signed(l.net)}</span>
        </div>`;
			}

			function esc(s) {
				return String(s).replace(
					/[&<>]/g,
					(c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])
				);
			}
			function showError(html) {
				document.getElementById(
					'error'
				).innerHTML = `<div class="err">${html}</div>`;
			}

			// View toggle (Main group / Everyone) — re-renders from cached data.
			document
				.getElementById('viewSeg')
				.addEventListener('click', (e) => {
					const btn = e.target.closest('button');
					if (!btn) return;
					viewMode = btn.dataset.mode;
					e.currentTarget
						.querySelectorAll('button')
						.forEach((b) => b.classList.toggle('active', b === btn));
					if (allEntries.length) render();
				});

			// Language toggle (ES / EN) — persists the choice and re-renders.
			document.getElementById('langSeg').addEventListener('click', (e) => {
				const btn = e.target.closest('button');
				if (!btn) return;
				lang = btn.dataset.lang;
				try {
					localStorage.setItem('pokerLang', lang);
				} catch (err) {}
				setLangButtons();
				applyStaticI18n();
				if (allEntries.length) render();
			});

			// Initial language paint (before data arrives).
			setLangButtons();
			applyStaticI18n();

			load();
			setInterval(load, REFRESH_MS);
		</script>
	</body>
</html>
